<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Desktop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="desktop">
    <img src="assets/mail-icon.gif" class="icon" id="mail-icon" style="top:70px; left:220px; width:360px;">
  </div>

  <div class="window" id="mail-popup">
    <div class="titlebar">
      <span>Message Alert</span>
      <button onclick="closeWindow('mail-popup')">X</button>
    </div>
    <div class="window-body">
      <p>You have 1 message waiting!</p>
      <button onclick="closeWindow('mail-popup')">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
