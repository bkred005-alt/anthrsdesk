<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Desktop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="desktop">
    <img src="assets/mail-icon.gif" class="icon" id="mail-icon" style="top:70px; left:220px; width:360px;">
    <img src="assets/cd-icon.gif" class="icon" id="cd-icon" style="top:400px; left:63px; width:100px;">
    <img src="assets/folder-icon.png" class="icon" id="folder-icon" style="top:100px; left:60px; width:100px;">
  </div>

  <div class="window" id="mail-popup">
    <button onclick="closeWindow('mail-popup')">X</button>
    </div>
    <div class="window-body">
  </div>

  <div class="window" id="gallery-popup">
    <button class="close-btn" onclick="closeWindow('gallery-popup')">✕</button>
    <div class="gallery-body">
      <img src="assets/photos/1.png">
      <img src="assets/photos/2.jpeg">
      <img src="assets/photos/3.jpeg">
      <img src="assets/photos/4.jpeg">
      <img src="assets/photos/5.JPEG">
      <img src="assets/photos/6.jpeg">
      <img src="assets/photos/7.jpeg">
      <img src="assets/photos/8.jpg">
      <img src="assets/photos/9.JPG">
      <img src="assets/photos/10.jpeg">
      <img src="assets/photos/11.jpeg">
      <img src="assets/photos/12.JPEG">
      <img src="assets/photos/13.jpeg">
      <img src="assets/photos/14.JPEG">
      <img src="assets/photos/15.jpeg">
      <img src="assets/photos/16.JPEG">
    </div>
  </div>

  <audio id="bg-music" src="assets/music.mp3" loop></audio>
  <script src="script.js"></script>
</body>
</html>
